<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cinematic Reel</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  font-family:'Cormorant Garamond', serif;
 
  background-size:400% 400%;
  animation:gradientMove 12s ease infinite;
}

@keyframes gradientMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* 9:16 Reel Layout */
.container{
  width:360px;
  height:640px;
  background:rgba(0,0,0,0.5);
  backdrop-filter:blur(25px);
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:30px;
  position:relative;
  animation:zoom 20s ease-in-out infinite alternate;
}

@keyframes zoom{
  from{transform:scale(1);}
  to{transform:scale(1.05);}
}

/* Text Styling */
#text{
  color:white;
  font-size:26px;
  line-height:1.5;
  text-shadow:0 0 10px rgba(255,255,255,0.5);
}

/* Cursor */
.cursor{
  display:inline-block;
  width:5px;
  background:white;
  margin-left:5px;
  animation:blink 1s infinite;
}

@keyframes blink{
  0%,100%{opacity:1;}
  50%{opacity:0;}
}

/* Fade-in per line */
.fade-line{
  opacity:0;
  animation:fadeIn 1.5s forwards;
}

@keyframes fadeIn{
  to{opacity:1;}
}

/* Red Floating Hearts */
.heart{
  position:absolute;
  color:rgba(255, 0, 0, 0.8);
  text-shadow:
    0 0 5px #ff0000,
    0 0 10px #ff1a1a,
    0 0 20px #ff4d4d;
  animation:floatUp linear infinite;
}

@keyframes floatUp{
  0%{
    transform:translateY(0) scale(1);
    opacity:0;
  }
  50%{
    opacity:1;
  }
  100%{
    transform:translateY(-800px) scale(1.5);
    opacity:0;
  }
}

</style>
</head>
<body>

<div class="container">
  <div>
    <div id="text"></div>
    <span class="cursor"></span>
  </div>
</div>

<script>

/*
Structure:
["Line Text", typingSpeed(ms), lineDelay(ms)]
*/

const lyrics = [
["Kaisi Hai Lagdi Kamaal", 80, 800],
["Teri Ankhiyan Gulaab", 80, 800],
["Ke Na Jaave Sadda Pyar", 60, 700],
["Tainu Chhadd Ke", 90, 900],
["Ho Jaave Tera Hi Deedar", 70, 800],
["Te Koyi Na Sambhal Vi", 60, 700],
["Paave Sadda Pyar", 70, 900],
["Tu Chhadd Ke", 90, 1100],
["Teri Raza Teri Zameen", 70, 800],
["Tere Iraade Ho Na", 70, 800],
["Teri Kami Hove Kabhi", 80, 900],
["Mere Kareeb Reh", 100, 900],
["Teri Raza Teri Zameen", 70, 800],
["Tere Iraade Ho Na", 70, 800],
["Teri Kami Hove Kabhi", 80, 1000],
["Mere Kareeb Reh", 90, 2000]
];

const textDiv = document.getElementById("text");

/* Typing Effect */
async function typeLyrics(){
  for(let [line, speed, delay] of lyrics){

    let lineDiv=document.createElement("div");
    lineDiv.classList.add("fade-line");
    textDiv.appendChild(lineDiv);

    for(let char of line){
      lineDiv.innerHTML += char;
      await new Promise(r => setTimeout(r, speed));
    }

    await new Promise(r => setTimeout(r, delay));
  }
}

/* Floating Hearts Generator */
function createHearts(){
  const heart=document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML="❤";
  heart.style.left=Math.random()*100+"%";
  heart.style.animationDuration=(4+Math.random()*4)+"s";
  heart.style.fontSize=(10+Math.random()*20)+"px";
  document.body.appendChild(heart);

  setTimeout(()=>{heart.remove();},8000);
}

setInterval(createHearts,500);

typeLyrics();

</script>

</body>
</html>
