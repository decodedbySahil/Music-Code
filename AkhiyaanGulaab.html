<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cinematic Full Screen</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  font-family:'Cormorant Garamond', serif;
  background:linear-gradient(-45deg,#2b0000,#400000,#1a0000,#330000);
  background-size:400% 400%;
  animation:gradientMove 12s ease infinite;
}

@keyframes gradientMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* Full Screen Center Text */
#text{
  color:white;
  font-size:48px;
  text-align:center;
  padding:40px;
  text-shadow:0 0 15px rgba(255,255,255,0.6);
}

/* Cursor */
.cursor{
  display:inline-block;
  width:6px;
  background:white;
  margin-left:8px;
  animation:blink 1s infinite;
}

@keyframes blink{
  0%,100%{opacity:1;}
  50%{opacity:0;}
}

/* Red Floating Hearts */
.heart{
  position:absolute;
  color:rgba(255,0,0,0.8);
  text-shadow:
    0 0 5px #ff0000,
    0 0 10px #ff1a1a,
    0 0 20px #ff4d4d;
  animation:floatUp linear infinite;
}

@keyframes floatUp{
  0%{transform:translateY(0) scale(1); opacity:0;}
  50%{opacity:1;}
  100%{transform:translateY(-800px) scale(1.5); opacity:0;}
}

</style>
</head>
<body>

<div>
  <div id="text"></div>
  <span class="cursor"></span>
</div>

<script>

/*
Same structure:
["Line Text", typingSpeed(ms), lineDelay(ms)]
*/

const lyrics = [
["Kaisi Hai Lagdi Kamaal", 80, 800],
["Teri Ankhiyan Gulaab", 80, 800],
["Ke Na Jaave Sadda Pyar", 60, 700],
["Tainu Chhadd Ke", 90, 900],
["Ho Jaave Tera Hi Deedar", 70, 800],
["Te Koyi Na Sambhal Vi", 60, 700],
["Paave Sadda Pyar", 70, 900],
["Tu Chhadd Ke", 90, 1100],
["Teri Raza Teri Zameen", 70, 800],
["Tere Iraade Ho Na", 70, 800],
["Teri Kami Hove Kabhi", 80, 900],
["Mere Kareeb Reh", 100, 900],
["Teri Raza Teri Zameen", 70, 800],
["Tere Iraade Ho Na", 70, 800],
["Teri Kami Hove Kabhi", 80, 1000],
["Mere Kareeb Reh", 90, 2000]
];

const textDiv = document.getElementById("text");

async function typeLyrics(){

  for(let [line, speed, delay] of lyrics){

    textDiv.innerHTML = "";   // Clear previous line

    for(let char of line){
      textDiv.innerHTML += char;
      await new Promise(r => setTimeout(r, speed));  // SAME SPEED
    }

    await new Promise(r => setTimeout(r, delay));    // SAME DELAY
  }
}

/* Floating Hearts */
function createHearts(){
  const heart=document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML="❤";
  heart.style.left=Math.random()*100+"%";
  heart.style.animationDuration=(4+Math.random()*4)+"s";
  heart.style.fontSize=(15+Math.random()*25)+"px";
  document.body.appendChild(heart);
  setTimeout(()=>heart.remove(),8000);
}

setInterval(createHearts,500);

typeLyrics();

</script>

</body>
</html>
