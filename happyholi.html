<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<title>Premium Holi - Horizontal Style</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;700&family=Hind:wght@600&display=swap" rel="stylesheet">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  height: 100vh;
  overflow: hidden;
  font-family: 'Poppins', sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle, #ff0080, #ff8c00, #40e0d0, #9932cc);
  background-size: 400% 400%;
  animation: bgMove 15s ease infinite;
}

@keyframes bgMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* Side Glass Text - Now Horizontal */
.side-text {
  position: absolute;
  padding: 12px 25px;
  border-radius: 15px;
  background: rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  color: white;
  font-family: 'Hind', sans-serif;
  font-size: 22px;
  border: 1px solid rgba(255, 255, 255, 0.3);
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
  z-index: 10;
  animation: floating 3s ease-in-out infinite;
}

/* Positions for Horizontal Text */
.top-left { top: 30px; left: 30px; }
.bottom-right { bottom: 30px; right: 30px; }

@keyframes floating {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

/* Main Glass Container */
.box {
  width: 700px;
  max-width: 90%;
  padding: 60px;
  border-radius: 30px;
  background: rgba(255, 255, 255, 0.12);
  backdrop-filter: blur(25px);
  -webkit-backdrop-filter: blur(25px);
  text-align: center;
  border: 1px solid rgba(255, 255, 255, 0.2);
  box-shadow: 0 25px 50px rgba(0,0,0,0.4);
  transition: transform 0.1s ease-out;
  z-index: 5;
  perspective: 1000px;
}

h1 {
  font-size: 55px;
  margin-bottom: 20px;
  background: linear-gradient(to right, #fff, #ffd700, #fff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

#lyrics {
  font-size: 26px;
  min-height: 90px;
  font-weight: 500;
  color: #fff;
  text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
}

.particle {
  position: absolute;
  bottom: -50px;
  animation: floatUp linear infinite;
}

@keyframes floatUp {
  to { transform: translateY(-110vh) rotate(360deg); }
}
</style>
</head>

<body>

<div class="side-text top-left">🌈 रंगों का त्योहार!</div>
<div class="side-text bottom-right">✨ खुशियों की बौछार!</div>

<div class="box" id="mainBox">
  <h1 id="title">🎉 Happy होली 💖</h1>
  <div id="lyrics"></div>
</div>

<script>
const lines = [
  ["Balam Pichkari jo tune mujhe maari...", 70, 1500],
  ["Toh Seedhi Saadi Chhori, Sharaabi Ho Gayi! 💃", 60, 1800],
  ["Haa Jeans Pahen Ke, Jo Tune Maara Thumka...", 60, 1500],
  ["Toh Lattoo Padosan Ki Bhabhi Ho Gayi! 😂", 60, 2500]
];

const lyricsDiv = document.getElementById("lyrics");
const colors = ['#FF1493', '#00FF00', '#FFD700', '#00BFFF', '#FF4500', '#FFFFFF'];

async function typeLines() {
  while(true) {
    for(let [text, speed, delay] of lines) {
      lyricsDiv.innerHTML = "";
      document.getElementById("title").style.filter = `hue-rotate(${Math.random() * 360}deg)`;

      for(let char of text) {
        lyricsDiv.innerHTML += char;
        await new Promise(r => setTimeout(r, speed));
      }
      
      await new Promise(r => setTimeout(r, delay));
    }
  }
}

function createParticle() {
  const p = document.createElement("div");
  const isHeart = Math.random() > 0.5;
  p.classList.add("particle");
  
  p.innerHTML = isHeart ? "❤" : "●";
  p.style.color = colors[Math.floor(Math.random() * colors.length)];
  p.style.left = Math.random() * 100 + "vw";
  p.style.fontSize = (Math.random() * 20 + 15) + "px";
  p.style.animationDuration = (Math.random() * 3 + 5) + "s";
  p.style.opacity = Math.random();
  
  document.body.appendChild(p);
  setTimeout(() => p.remove(), 8000);
}

// Subtle 3D Mouse Movement
const box = document.getElementById("mainBox");
document.addEventListener("mousemove", (e) => {
  let x = (window.innerWidth / 2 - e.pageX) / 30;
  let y = (window.innerHeight / 2 - e.pageY) / 30;
  box.style.transform = `rotateY(${-x}deg) rotateX(${y}deg)`;
});

setInterval(createParticle, 400);
typeLines();

</script>

</body>
</html>
